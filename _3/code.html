<span class="text-primary/60 font-headline tracking-[0.3em] text-xs uppercase">岁月沉淀 · 匠心传承</span>
<h2 class="text-3xl md:text-4xl font-headline font-black text-on-surface leading-snug ink-bleed">
                    三载光阴，<br class="md:hidden"/>
                    方得一缕艾香
                </h2>
</div>
<div class="prose prose-stone max-w-none">
<p class="text-lg md:text-xl text-on-surface-variant font-headline font-medium leading-[2.2] tracking-wider opacity-90">
                    一株蕲艾历经三年光阴沉淀，<br/>
                    在幽静的仓储中自然陈化，<br/>
                    方能逐渐褪去初生时的燥烈之气。<br/>
                    这是时光与自然的默契，<br/>
                    是唯有蕲春土地方能孕育出的温润平衡。<br/>
                    由此而成的温经通络良品，<br/>
                    承载着千年非遗的守护与智慧。
                </p>
</div>
<!-- Decorative Elements -->
<div class="flex justify-center items-center gap-8 pt-8 opacity-70">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-primary mb-2 text-xl">history_edu</span>

<div class="h-6 w-[1px] bg-primary/20"></div>

</div>
<div class="h-6 w-[1px] bg-primary/20"></div>

<p class="text-on-surface-variant text-sm mt-2 font-medium opacity-80">恒温恒湿的木质空间，是蕲艾最好的归宿。</p>
</div>

</div>

<p class="text-on-surface-variant text-sm mt-3 italic font-medium leading-relaxed opacity-90">“艾之火，温暖的是经络，守住的是文化。”</p>
</div>
<div class="mt-8 flex items-center gap-4 bg-white/60 p-4 rounded-2xl backdrop-blur-sm shadow-sm border border-white/80">

        window.location.href = "../npc/code.html";
