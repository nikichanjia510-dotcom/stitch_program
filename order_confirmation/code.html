<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>确认订单</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24;
    }
    body {
      min-height: 100dvh;
      background: #f6f2ed;
    }
  </style>
</head>
<body class="text-[#272219] font-['Manrope']">
  <header class="fixed top-0 left-0 right-0 z-40 bg-[#f6f2ed]/95 backdrop-blur-sm border-b border-[#e7ded1]">
    <div class="h-16 max-w-md mx-auto px-4 flex items-center gap-3">
      <button id="back-btn" class="w-9 h-9 rounded-full text-[#2f6b3f] hover:bg-[#2f6b3f]/10 flex items-center justify-center">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <h1 class="font-['Noto_Serif_SC'] text-[26px] sm:text-[28px] font-black text-[#2f6b3f]">确认订单</h1>
    </div>
  </header>

  <main class="pt-20 pb-44 max-w-md mx-auto px-4 space-y-6">
    <section class="rounded-[1.75rem] p-4 sm:p-5 bg-gradient-to-br from-[#708775] to-[#d2d1b8] shadow-[0_8px_30px_rgba(0,0,0,0.08)]">
      <div class="rounded-2xl overflow-hidden">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8uP4xlm-m3Y86f5we3XZMBFt3Y_q0PjkotwoP8kUtTntZ95e7SZWdnCLYILF6WRUpRTLnkYlnJ0OwomxF05f6VaJRi7DyjJ7h7wFvrlU1enCWJ5MPwFcf8swg9OoXWo_TZzdUcRMQdt9YmRXjDqHMY7YLfI1XWPRlSpYu2kRi3bjPA6san6Egkx4GAJ-hO09lWQ6vW8NeI4QVGNUpxA7hyOL8VCBf-HapEFCZ4AFsqjH1RMAWPqv0QFqwIH7DNrxexY4IsO6A4Jve" alt="陈年艾柱" class="w-full h-40 sm:h-44 object-cover" />
      </div>
      <div class="mt-5">
        <div class="flex items-center justify-between">
          <h2 class="font-['Noto_Serif_SC'] text-[36px] sm:text-[40px] font-black tracking-tight">陈年艾柱</h2>
          <span class="px-3 py-1 rounded-full bg-[#f0d4df] text-[#6f5f66] text-[14px] sm:text-[15px] font-semibold">五年陈艾</span>
        </div>
        <p class="mt-2 text-[18px] sm:text-[20px] text-[#465146]">古法工序炮制，五年陈艾，温经散寒。</p>
        <div class="mt-4 text-right">
          <p class="text-[20px] sm:text-[22px] line-through text-[#6c6f69]">¥128.00</p>
          <p class="text-[42px] sm:text-[46px] font-black font-['Noto_Serif_SC'] leading-none">¥128.00</p>
        </div>
        <p class="mt-1 text-[15px] sm:text-[16px] text-[#596257]">规格：精选装（10柱/盒）</p>
      </div>
    </section>

    <section>
      <h3 class="font-['Noto_Serif_SC'] text-[26px] sm:text-[28px] font-black mb-3 text-[#2d2d24]">• 费用明细</h3>
      <div class="rounded-[1.8rem] bg-[#efe4d4] p-5 border border-[#e4d8c6]">
        <div class="rounded-2xl bg-[#e6ddcf] px-4 py-3 flex items-center justify-between border-l-4 border-[#2f6b3f]">
          <div>
            <p class="text-[20px] sm:text-[22px] font-extrabold text-[#2f6b3f]">🎟 非遗守护者8折优惠券</p>
            <p class="text-[12px] sm:text-[13px] text-[#90937f] font-semibold">已自动使用</p>
          </div>
          <p class="text-[26px] sm:text-[28px] text-[#2f6b3f] line-through">-¥25.60</p>
        </div>
        <div class="mt-5 space-y-2 text-[23px] sm:text-[24px] text-[#3d4037]">
          <div class="flex justify-between"><span>商品小计</span><span>¥128.00</span></div>
          <div class="flex justify-between"><span>运费（蕲春专送）</span><span class="text-[#2f6b3f] font-bold">免运费</span></div>
        </div>
        <div class="mt-4 pt-4 border-t border-[#d6cab8] flex justify-between items-end">
          <span class="text-[28px] sm:text-[30px] font-['Noto_Serif_SC'] font-black">预计支付金额</span>
          <span class="text-[40px] sm:text-[44px] font-['Noto_Serif_SC'] font-black leading-none">¥102.40</span>
        </div>
      </div>
    </section>
  </main>

  <div class="fixed bottom-0 left-0 right-0 z-50 bg-[#f8f3ed] border-t border-[#e5dccf] rounded-t-[2rem] px-4 pb-5 pt-4">
    <div class="max-w-md mx-auto">
      <div class="flex items-center justify-center gap-5 text-[#7a8072] text-sm font-bold mb-3">
        <span class="inline-flex items-center gap-1.5"><span class="material-symbols-outlined text-base">shield</span>安全支付</span>
        <span class="inline-flex items-center gap-1.5"><span class="material-symbols-outlined text-base">help</span>帮助中心</span>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex-1">
          <p class="text-[12px] text-[#8a8c80] font-semibold">总计金额</p>
          <p class="text-[34px] sm:text-[38px] font-black font-['Noto_Serif_SC'] leading-none">合计：¥102.40</p>
        </div>
        <button id="confirm-pay-btn" class="w-40 h-12 rounded-full bg-gradient-to-r from-[#2f6b3f] to-[#79ad7e] text-white text-[22px] font-bold shadow-lg active:scale-95 transition-transform" type="button">
          确认支付
        </button>
      </div>
      <p id="pay-result" class="mt-3 text-center text-[#2f6b3f] text-sm font-bold hidden">支付成功，订单已确认。</p>
    </div>
  </div>

  <script>
    document.getElementById("back-btn").addEventListener("click", () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "../_4/detail.html";
      }
    });

    const confirmPayBtn = document.getElementById("confirm-pay-btn");
    const payResult = document.getElementById("pay-result");
    confirmPayBtn?.addEventListener("click", () => {
      payResult?.classList.remove("hidden");
      confirmPayBtn.textContent = "已支付";
      confirmPayBtn.setAttribute("disabled", "true");
      confirmPayBtn.classList.add("opacity-75");
    });
  </script>
</body>
</html>
