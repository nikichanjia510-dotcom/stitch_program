<script>
  window.renderBottomNav("#common-bottom-nav", "encounter");

  const stepCards = Array.from(document.querySelectorAll("#step-cards [data-step]"));
  const confirmSortBtn = document.getElementById("confirm-sort-btn");
  const sortResultMessage = document.getElementById("sort-result-message");
  const rewardActions = document.getElementById("reward-actions");
  const selectedOrder = [];
  const correctOrder = ["step1", "step2", "step3"];

  function refreshCardStates() {
    stepCards.forEach((card) => {
      const step = card.dataset.step;
      const orderIndex = selectedOrder.indexOf(step);
      const badge = card.querySelector(".order-badge");
      if (!badge) return;
      if (orderIndex >= 0) {
        badge.textContent = String(orderIndex + 1);
        badge.classList.remove("opacity-0", "group-hover:opacity-100");
        card.classList.remove("border-transparent");
        card.classList.add("border-primary/40", "bg-primary/5");
      } else {
        badge.textContent = "";
        badge.classList.add("opacity-0", "group-hover:opacity-100");
        card.classList.remove("border-primary/40", "bg-primary/5");
        card.classList.add("border-transparent");
      }
    });
  }

  stepCards.forEach((card) => {
    card.addEventListener("click", () => {
      const step = card.dataset.step;
      const existingIndex = selectedOrder.indexOf(step);
      if (existingIndex >= 0) {
        selectedOrder.splice(existingIndex, 1);
      } else if (selectedOrder.length < 3) {
        selectedOrder.push(step);
      }
      sortResultMessage.textContent = "";
      rewardActions.classList.add("hidden");
      refreshCardStates();
    });
  });

  confirmSortBtn?.addEventListener("click", () => {
    if (selectedOrder.length !== 3) {
      sortResultMessage.textContent = "请先按顺序点选完 3 个工序卡片。";
      rewardActions.classList.add("hidden");
      return;
    }

    const isCorrect = selectedOrder.every((step, index) => step === correctOrder[index]);
    if (isCorrect) {
      sortResultMessage.textContent = "回答正确，已解锁优惠券与工艺故事。";
      rewardActions.classList.remove("hidden");
      window.setTimeout(() => {
        window.location.href = "../_2/code.html";
      }, 700);
    } else {
      sortResultMessage.textContent = "排序不正确，请重试。";
      rewardActions.classList.add("hidden");
    }
  });

  refreshCardStates();

  const backBtn = document.querySelector("header .material-symbols-outlined");
  if (backBtn && backBtn.textContent.trim() === "arrow_back") {
    backBtn.closest("button")?.addEventListener("click", () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "../_1/code.html";
      }
    });
  }
</script>
